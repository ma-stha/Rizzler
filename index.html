<!DOCTYPE html>
<html>
<head>
  <title>Rizzler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="/socket.io/socket.io.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system;
      background: radial-gradient(circle, #140c2a, #0b0615);
      color: white;
      display: flex;
      justify-content: center;
      height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
    }

    .landing {
      position: absolute;
      inset: 0;
      background: #0b0615;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .landing img { width: 160px; }

    .header {
      text-align: center;
      padding: 10px;
    }

    .header img {
      width: 100px;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      padding: 8px;
      border-radius: 12px;
      margin: 4px;
      max-width: 70%;
    }

    .you { background: #7b4bff; align-self: flex-end; }
    .stranger { background: #2a2a2a; align-self: flex-start; }
    .system { text-align: center; opacity: 0.5; }

    .input-area {
      display: flex;
      padding: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      margin-left: 5px;
      padding: 10px;
      background: #7b4bff;
      border: none;
      color: white;
    }

    .exit {
      margin: 10px;
      background: red;
      padding: 12px;
    }
  </style>
</head>

<body>

<div class="app">

  <div class="landing" id="landing">
    <img src="logo.png">
    <button onclick="startApp()">Start Chat</button>
  </div>

  <div class="header">
    <img src="logo.png">
    <div id="status">Finding someone...</div>
    <div id="timer"></div>
  </div>

  <div id="chat" class="chat"></div>

  <div class="input-area">
    <input id="msg" oninput="typing()" placeholder="Say something...">
    <button onclick="send()">Send</button>
  </div>

  <button class="exit" onclick="next()">Exit</button>

</div>

<div id="popup" style="display:none;">
  Continue?
  <button onclick="continueChat()">Yes</button>
  <button onclick="next()">Next</button>
</div>

<script src="script.js"></script>

</body>
</html>
