<!DOCTYPE html>
<html>
<head>
  <title>Rizzler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/socket.io/socket.io.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0615;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 400px;
      height: 90vh;
      background: #151020;
      display: flex;
      flex-direction: column;
      border-radius: 10px;
      overflow: hidden;
    }

    .chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .msg {
      margin: 5px 0;
      padding: 8px;
      border-radius: 10px;
    }

    .you {
      background: #7b4bff;
      text-align: right;
    }

    .stranger {
      background: #333;
    }

    .system {
      text-align: center;
      font-size: 12px;
      opacity: 0.6;
    }

    .input {
      display: flex;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      background: #7b4bff;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="app">
  <div class="chat" id="chat"></div>

  <div class="input">
    <input id="msg" placeholder="Type..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
