<!DOCTYPE html>
<html>
<head>
  <title>Rizzler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

  <script src="/socket.io/socket.io.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, sans-serif;
      background: radial-gradient(circle at top, #140c2a, #0b0615);
      color: white;
      display: flex;
      justify-content: center;
      height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* 🔥 LANDING */
    .landing {
      position: absolute;
      inset: 0;
      background: #0b0615;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 10;
    }

    .start-btn {
      margin-top: 20px;
      padding: 14px 24px;
      border-radius: 12px;
      background: #7b4bff;
      border: none;
      color: white;
      font-size: 16px;
    }

    .logo-img {
      width: 150px;
      filter: drop-shadow(0 0 12px rgba(123,75,255,0.6));
    }

    .header {
      text-align: center;
      padding: 12px;
    }

    .status {
      font-size: 13px;
      opacity: 0.7;
    }

    .timer {
      color: #7b4bff;
      font-weight: bold;
    }

    .timer.red {
      color: red;
      transform: scale(1.1);
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      padding: 8px 12px;
      margin: 4px 0;
      border-radius: 14px;
      max-width: 70%;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .you { background: #7b4bff; align-self: flex-end; }
    .stranger { background: #2a2a2a; align-self: flex-start; }

    .system {
      text-align: center;
      font-size: 12px;
      opacity: 0.5;
    }

    .typing {
      font-size: 12px;
      opacity: 0.6;
    }

    .input-area {
      display: flex;
      padding: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #1c1c2a;
      color: white;
    }

    button {
      margin-left: 6px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #7b4bff;
      color: white;
    }

    .exit {
      margin: 10px;
      padding: 14px;
      background: red;
      border-radius: 10px;
      width: calc(100% - 20px);
    }

    .popup {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #111;
      padding: 20px;
      border-radius: 10px;
      display: none;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="app">

  <!-- 🔥 LANDING -->
  <div class="landing" id="landing">
    <img src="logo.png" class="logo-img">
    <div style="margin-top:10px;opacity:0.7;">Rizz for Real Connection</div>
    <button class="start-btn" onclick="startApp()">Start Chat</button>
  </div>

  <div class="header">
    <div id="status" class="status">Finding someone...</div>
    <div id="timer" class="timer"></div>
  </div>

  <div id="chat" class="chat"></div>

  <div class="input-area">
    <input id="msg" placeholder="Say something interesting..." oninput="typing()">
    <button onclick="send()">Send</button>
  </div>

  <button class="exit" onclick="next()">Exit</button>

</div>

<div id="popup" class="popup">
  Continue chatting?<br><br>
  <button onclick="continueChat()">Continue</button>
  <button onclick="next()">Next</button>
</div>

<script src="script.js"></script>

</body>
</html>
