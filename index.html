<!DOCTYPE html>
<html>
<head>
  <title>Rizzler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/socket.io/socket.io.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, sans-serif;
      background: radial-gradient(circle at top, #140a22, #050308);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 420px;
      height: 90vh;
      background: rgba(20,15,30,0.9);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 40px rgba(140,80,255,0.2);
    }

    .header {
      text-align: center;
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .logo {
      font-weight: 700;
      font-size: 18px;
      background: linear-gradient(90deg, #fff, #c7a6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 4px;
    }

    .chat {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .msg {
      padding: 8px 12px;
      margin: 4px 0;
      border-radius: 14px;
      max-width: 70%;
      font-size: 14px;
      word-wrap: break-word;
    }

    .you {
      background: linear-gradient(135deg, #8c52ff, #5f2bff);
      align-self: flex-end;
    }

    .stranger {
      background: rgba(255,255,255,0.08);
      align-self: flex-start;
    }

    .system {
      text-align: center;
      font-size: 12px;
      opacity: 0.5;
    }

    .input-area {
      display: flex;
      padding: 10px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: rgba(255,255,255,0.08);
      color: white;
    }

    button {
      margin-left: 6px;
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, #8c52ff, #5f2bff);
      color: white;
      font-weight: 600;
    }

    .exit {
      margin: 10px;
      background: rgba(255,0,0,0.25);
    }
  </style>
</head>

<body>

<div class="app">

  <div class="header">
    <div class="logo">🔥 Rizzler</div>
    <div class="status" id="status">Finding someone...</div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <input id="msg" placeholder="Type..." />
    <button onclick="send()">Send</button>
  </div>

  <button class="exit" onclick="exitChat()">Exit</button>

</div>

<script src="script.js"></script>

</body>
</html>
