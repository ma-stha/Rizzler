<!DOCTYPE html>
<html>
<head>
  <title>Rizler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0f0f0f">
  <script src="/socket.io/socket.io.js"></script>

  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
      font-family: -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: white;
    }

    .app {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 700px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
    }

    @media (min-width: 768px) {
      .app {
        border-radius: 25px;
        height: 640px;
      }
    }

    .header {
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .timer {
      font-size: 20px;
      color: #00ffcc;
    }

    .chat {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .msg {
      padding: 10px 14px;
      margin: 6px 0;
      border-radius: 18px;
      max-width: 75%;
      animation: fadeIn 0.2s ease;
    }

    .you {
      background: #00ffcc;
      color: black;
      margin-left: auto;
    }

    .stranger {
      background: rgba(255,255,255,0.1);
    }

    .system {
      font-size: 12px;
      opacity: 0.6;
      text-align: center;
    }

    .typing {
      font-size: 12px;
      opacity: 0.6;
      margin: 5px;
    }

    .input-area {
      display: flex;
      padding: 10px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
      font-size: 16px;
    }

    button {
      margin-left: 8px;
      padding: 10px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .send {
      background: #00ffcc;
      color: black;
    }

    .actions {
      display: none;
      justify-content: space-around;
      padding: 10px;
    }

    .continue {
      background: #00ffcc;
      color: black;
      flex: 1;
      margin: 5px;
    }

    .next {
      background: #ff4d4d;
      flex: 1;
      margin: 5px;
      color: white;
    }

    .bottom-bar {
      padding: 10px;
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: center;
    }

    .exit {
      background: rgba(255,77,77,0.2);
      color: #ff4d4d;
      border: 1px solid rgba(255,77,77,0.4);
      padding: 10px 20px;
    }

    .exit:hover {
      background: #ff4d4d;
      color: white;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<div class="app">

  <div class="header">
    🔥 Rizler
    <div class="timer" id="timer">2:00</div>
  </div>

  <div class="chat" id="chat"></div>
  <div id="typing" class="typing"></div>

  <div class="input-area">
    <input id="msg" placeholder="Say something..." oninput="typing()" />
    <button class="send" onclick="send()">Send</button>
  </div>

  <div class="actions" id="actions">
    <button class="continue" onclick="decide('continue')">Continue</button>
    <button class="next" onclick="decide('next')">Next</button>
  </div>

  <div class="bottom-bar">
    <button class="exit" onclick="exitChat()">Exit</button>
  </div>

</div>

<script>
const socket = io();

socket.on("startChat", () => {
  clearChat();
  addMsg("2 minutes. Impress or skip.", "system");
  startTimer();
  document.getElementById("msg").focus();
});

socket.on("message", (msg) => {
  addMsg(msg, "stranger");
});

socket.on("typing", () => {
  document.getElementById("typing").innerText = "Stranger is typing...";
  setTimeout(() => {
    document.getElementById("typing").innerText = "";
  }, 1000);
});

socket.on("continueChat", () => {
  addMsg("Both matched 🔥", "system");
  document.getElementById("actions").style.display = "none";
  startTimer();
});

socket.on("endChat", () => {
  addMsg("Moving to next...", "system");
  setTimeout(() => {
    clearChat();
    socket.emit("nextUser");
  }, 500);
});

function send() {
  const input = document.getElementById("msg");
  const msg = input.value.trim();
  if (!msg) return;

  socket.emit("message", msg);
  addMsg(msg, "you");
  input.value = "";
}

function typing() {
  socket.emit("typing");
}

function addMsg(text, type) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.classList.add("msg");

  if (type === "you") div.classList.add("you");
  else if (type === "stranger") div.classList.add("stranger");
  else div.classList.add("system");

  div.innerText = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function clearChat() {
  document.getElementById("chat").innerHTML = "";
}

let time = 120;
let interval;

function startTimer() {
  time = 120;
  clearInterval(interval);

  interval = setInterval(() => {
    time--;
    document.getElementById("timer").innerText = format(time);

    if (time <= 0) {
      clearInterval(interval);
      showActions();
    }
  }, 1000);
}

function format(s) {
  const m = Math.floor(s/60);
  const sec = s%60;
  return m + ":" + (sec < 10 ? "0" : "") + sec;
}

function showActions() {
  document.getElementById("actions").style.display = "flex";
}

function decide(choice) {
  socket.emit("decision", choice);
}

function exitChat() {
  if (confirm("Leave chat?")) {
    clearChat();
    socket.emit("nextUser");
  }
}
</script>

</body>
</html>
