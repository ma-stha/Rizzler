<!DOCTYPE html>
<html>
<head>
  <title>Rizzler</title>

  <!-- 🔥 THIS FIXES iPhone ZOOM -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <script src="/socket.io/socket.io.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, sans-serif;
      background: radial-gradient(circle, #140c2a, #0b0615);
      color: white;
      display: flex;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .app {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      text-align: center;
      padding: 12px;
    }

    .header img {
      width: 110px;
      margin-bottom: 5px;
    }

    #status {
      font-size: 14px;
      opacity: 0.8;
    }

    #timer {
      font-size: 13px;
      color: #a970ff;
      margin-top: 2px;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      padding: 10px 12px;
      border-radius: 14px;
      margin: 5px 0;
      max-width: 70%;
      font-size: 15px;
    }

    .you {
      background: #7b4bff;
      align-self: flex-end;
    }

    .stranger {
      background: #2a2a2a;
      align-self: flex-start;
    }

    .system {
      text-align: center;
      opacity: 0.5;
      font-size: 13px;
    }

    .input-area {
      display: flex;
      padding: 10px;
      gap: 6px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;

      /* 🔥 THIS FIXES iOS ZOOM */
      font-size: 16px;
    }

    button {
      padding: 12px 14px;
      border-radius: 10px;
      border: none;
      background: #7b4bff;
      color: white;
    }

    .exit {
      margin: 10px;
      background: #ff2a2a;
      padding: 14px;
      border-radius: 12px;
    }
  </style>
</head>

<body>

<div class="app">

  <div class="header">
    <img src="logo.png">
    <div id="status">Finding someone...</div>
    <div id="timer"></div>
  </div>

  <div id="chat" class="chat"></div>

  <div class="input-area">
    <input id="msg" placeholder="Say something..." oninput="typing()">
    <button onclick="send()">Send</button>
  </div>

  <button class="exit" onclick="next()">Exit</button>

</div>

<div id="popup" style="display:none; position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); background:#111; padding:20px; border-radius:10px;">
  Continue?
  <br><br>
  <button onclick="continueChat()">Yes</button>
  <button onclick="next()">Next</button>
</div>

<script src="script.js"></script>

</body>
</html>
