<!DOCTYPE html>
<html>
<head>
  <title>Rizzler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <script src="/socket.io/socket.io.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system;
      background: #0b0615;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      padding: 10px;
    }

    .timer {
      color: #7b4bff;
      font-size: 20px;
      margin-top: 5px;
    }

    .chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .msg {
      padding: 8px 12px;
      margin: 4px 0;
      border-radius: 14px;
      max-width: 70%;
    }

    .you {
      background: #7b4bff;
      align-self: flex-end;
    }

    .stranger {
      background: #333;
      align-self: flex-start;
    }

    .input-area {
      display: flex;
      padding: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
    }

    button {
      margin-left: 5px;
      padding: 10px;
      background: #7b4bff;
      color: white;
      border: none;
      border-radius: 10px;
    }

    .popup {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #111;
      padding: 20px;
      border-radius: 10px;
      display: none;
      text-align: center;
    }

    .popup button {
      margin: 10px;
    }
  </style>
</head>

<body>

<div class="app">

  <div class="header">
    <div>🔥 Rizzler</div>
    <div id="status">Finding someone...</div>
    <div class="timer" id="timer"></div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <input id="msg" placeholder="Type..." />
    <button onclick="send()">Send</button>
  </div>

</div>

<div class="popup" id="popup">
  <div>Continue chatting?</div>
  <button onclick="continueChat()">Continue</button>
  <button onclick="next()">Next</button>
</div>

<script src="script.js"></script>

</body>
</html>
