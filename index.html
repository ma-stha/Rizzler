<!DOCTYPE html>
<html>
<head>
  <title>Rizzler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <script src="/socket.io/socket.io.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system;
      background: #0b0615;
      color: white;
      display: flex;
      justify-content: center;
      height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      text-align: center;
      padding: 10px;
    }

    .timer {
      color: #7b4bff;
      font-weight: bold;
      transition: 0.3s;
    }

    .timer.red {
      color: red;
      transform: scale(1.1);
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      padding: 8px 12px;
      margin: 4px 0;
      border-radius: 12px;
      max-width: 70%;
    }

    .you { background: #7b4bff; align-self: flex-end; }
    .stranger { background: #333; align-self: flex-start; }

    .system {
      text-align: center;
      opacity: 0.5;
      font-size: 12px;
    }

    .input-area {
      display: flex;
      padding: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
    }

    button {
      margin-left: 5px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #7b4bff;
      color: white;
    }

    .exit {
      margin: 10px;
      padding: 14px;
      background: red;
      border: none;
      border-radius: 10px;
      width: calc(100% - 20px);
    }

    .popup {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #111;
      padding: 20px;
      display: none;
    }
  </style>
</head>

<body>

<div class="app">

  <div class="header">
    🔥 Rizzler  
    <div id="status">Finding someone...</div>
    <div id="timer" class="timer"></div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <input id="msg" placeholder="Type..." oninput="typing()" />
    <button onclick="send()">Send</button>
  </div>

  <button class="exit" onclick="next()">Exit</button>

</div>

<div class="popup" id="popup">
  Continue?
  <button onclick="continueChat()">Yes</button>
  <button onclick="next()">Next</button>
</div>

<script src="script.js"></script>

</body>
</html>
