<!DOCTYPE html>
<html>
<head>
  <title>Rizzler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <script src="/socket.io/socket.io.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system;
      background: #0b0615;
      color: white;
      height: 100vh;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .logo {
      font-weight: bold;
      font-size: 18px;
    }

    .status {
      opacity: 0.6;
      font-size: 13px;
      margin-top: 4px;
    }

    /* ✅ TIMER ON TOP */
    .timer {
      margin-top: 6px;
      color: #7b4bff;
      font-weight: bold;
      font-size: 16px;
    }

    .chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .msg {
      padding: 8px 12px;
      margin: 4px 0;
      border-radius: 14px;
      max-width: 70%;
      font-size: 14px;
    }

    .you {
      background: #7b4bff;
      align-self: flex-end;
    }

    .stranger {
      background: #333;
      align-self: flex-start;
    }

    .input-area {
      display: flex;
      padding: 10px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }

    input {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    .send-btn {
      margin-left: 6px;
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      background: #7b4bff;
      color: white;
    }

    /* ✅ EXIT LIKE BEFORE */
    .exit {
      margin: 10px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: rgba(255,0,0,0.6);
      color: white;
      font-weight: bold;
      width: calc(100% - 20px);
    }

    .popup {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #111;
      padding: 20px;
      border-radius: 10px;
      display: none;
      text-align: center;
    }

    .popup button {
      margin: 10px;
    }

  </style>
</head>

<body>

<div class="app">

  <div class="header">
    <div class="logo">🔥 Rizzler</div>
    <div class="status" id="status">Finding someone...</div>
    <div class="timer" id="timer">2:00</div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <input id="msg" placeholder="Type..." />
    <button class="send-btn" onclick="send()">Send</button>
  </div>

  <button class="exit" onclick="next()">Exit</button>

</div>

<div class="popup" id="popup">
  <div>Continue chatting?</div>
  <button onclick="continueChat()">Continue</button>
  <button onclick="next()">Next</button>
</div>

<script src="script.js"></script>

</body>
</html>
