<!DOCTYPE html>
<html>
<head>
  <title>Rizzler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preload" as="image" href="logo.png">

  <script src="/socket.io/socket.io.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system;
      background: radial-gradient(circle, #140c2a, #0b0615);
      color: white;
      display: flex;
      justify-content: center;
      height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      text-align: center;
      padding: 12px;
    }

    .header img {
      width: 110px;
    }

    #status { font-size: 14px; }
    #timer { font-size: 14px; margin-top: 4px; color: #a970ff; }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      padding: 10px;
      border-radius: 14px;
      margin: 4px 0;
      max-width: 70%;
    }

    .you { background: #7b4bff; align-self: flex-end; }
    .stranger { background: #2a2a2a; }
    .system { text-align: center; opacity: 0.6; }

    .input-area {
      display: flex;
      padding: 10px;
      gap: 6px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-size: 16px;
    }

    button {
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #7b4bff;
      color: white;
    }

    .exit {
      margin: 10px;
      background: red;
      padding: 14px;
    }
  </style>
</head>

<body>

<div class="app">

  <div class="header">
    <img src="logo.png">
    <div id="status">Finding someone...</div>
    <div id="timer"></div>
  </div>

  <div id="chat" class="chat"></div>

  <div class="input-area">
    <input id="msg" placeholder="Say something..." oninput="typing()">
    <button onclick="send()">Send</button>
  </div>

  <button class="exit" onclick="next()">Exit</button>

</div>

<div id="popup" style="display:none; position:absolute; top:40%; left:50%; transform:translate(-50%,-50%); background:#111; padding:20px;">
  Continue?
  <button onclick="continueChat()">Yes</button>
  <button onclick="next()">Next</button>
</div>

<script src="script.js"></script>

</body>
</html>
