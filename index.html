<!DOCTYPE html>
<html>
<head>
  <title>Rizler</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/socket.io/socket.io.js"></script>

  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      font-family: -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
    }

    .app {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      max-height: 700px;
      display: flex;
      flex-direction: column;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
    }

    .header {
      text-align: center;
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .timer {
      color: #00ffcc;
      font-size: 18px;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
    }

    .msg {
      padding: 10px;
      margin: 5px;
      border-radius: 15px;
      max-width: 70%;
    }

    .you {
      background: #00ffcc;
      color: black;
      margin-left: auto;
    }

    .stranger {
      background: rgba(255,255,255,0.1);
    }

    .system {
      text-align: center;
      font-size: 12px;
      opacity: 0.6;
    }

    .input-area {
      display: flex;
      padding: 10px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    input {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      margin-left: 5px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .send { background: #00ffcc; color: black; }
    .continue { background: green; color: white; }
    .next { background: red; color: white; }
    .exit { background: darkred; color: white; }

    .actions {
      display: none;
      justify-content: space-around;
      padding: 10px;
    }

    .bottom {
      text-align: center;
      padding: 10px;
    }
  </style>
</head>

<body>

<div class="app">
  <div class="header">
    🔥 Rizler
    <div class="timer" id="timer">2:00</div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <input id="msg" placeholder="Say something..." />
    <button class="send" onclick="send()">Send</button>
  </div>

  <div class="actions" id="actions">
    <button class="continue" onclick="decide('continue')">Continue</button>
    <button class="next" onclick="decide('next')">Next</button>
  </div>

  <div class="bottom">
    <button class="exit" onclick="exitChat()">Exit</button>
  </div>
</div>

<script>
const socket = io();

let time = 120;
let interval;
let isTimerRunning = false;

// START CHAT (timer runs ONLY here)
socket.on("startChat", () => {
  clearChat();
  addMsg("You have 2 minutes. Go.", "system");
  startTimer();
});

// RECEIVE MESSAGE
socket.on("message", (msg) => {
  addMsg(msg, "stranger");
});

// CONTINUE CHAT (NO TIMER RESET HERE ❗)
socket.on("continueChat", () => {
  addMsg("Both matched 🔥 Continue chatting", "system");
  document.getElementById("actions").style.display = "none";
});

// END CHAT → FIND NEW USER
socket.on("endChat", () => {
  addMsg("Finding new person...", "system");
  setTimeout(() => {
    clearChat();
    socket.emit("nextUser");
  }, 800);
});

// SEND MESSAGE
function send() {
  const input = document.getElementById("msg");
  const msg = input.value.trim();
  if (!msg) return;

  socket.emit("message", msg);
  addMsg(msg, "you");
  input.value = "";
}

// ADD MESSAGE UI
function addMsg(text, type) {
  const div = document.createElement("div");
  div.classList.add("msg");

  if (type === "you") div.classList.add("you");
  else if (type === "stranger") div.classList.add("stranger");
  else div.classList.add("system");

  div.innerText = text;
  document.getElementById("chat").appendChild(div);
}

// CLEAR CHAT
function clearChat() {
  document.getElementById("chat").innerHTML = "";
}

// TIMER (FIXED BUG)
function startTimer() {
  if (isTimerRunning) return;

  isTimerRunning = true;
  time = 120;

  clearInterval(interval);

  interval = setInterval(() => {
    time--;
    document.getElementById("timer").innerText = format(time);

    if (time <= 0) {
      clearInterval(interval);
      isTimerRunning = false;
      document.getElementById("actions").style.display = "flex";
    }
  }, 1000);
}

// FORMAT TIME
function format(s) {
  let m = Math.floor(s / 60);
  let sec = s % 60;
  return m + ":" + (sec < 10 ? "0" : "") + sec;
}

// DECISION
function decide(choice) {
  socket.emit("decision", choice);
}

// EXIT
function exitChat() {
  if (confirm("Leave chat?")) {
    clearChat();
    socket.emit("nextUser");
  }
}
</script>

</body>
</html>
